  tags:
  - Administration
  - Configuration
  - Properties
  - Data Streams
  properties:
  - type: OpenAPI
    url: https://analyticsadmin.googleapis.com/$discovery/rest?version=v1beta
  - type: Documentation
    url: https://developers.google.com/analytics/devguides/config/admin/v1
